<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚽ Panini Import</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
  .card { background: #fff; border-radius: 16px; padding: 2rem; max-width: 520px; width: 100%; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
  h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: .25rem; }
  .sub { color: #666; font-size: .88rem; margin-bottom: 1.75rem; }
  label { font-size: .82rem; font-weight: 600; color: #555; display: block; margin-bottom: .4rem; }
  input { width: 100%; padding: .6rem .85rem; border-radius: 8px; border: 1.5px solid #d0d0d0; font-size: .9rem; margin-bottom: 1.25rem; outline: none; }
  input:focus { border-color: #1a56a0; }
  .user-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .user-card { border: 2px solid #d0d0d0; border-radius: 10px; padding: 12px; cursor: pointer; transition: all .15s; text-align: center; }
  .user-card:hover { border-color: #2d7a3a; }
  .user-card.selected { border-color: #2d7a3a; background: #e8f5ea; }
  .user-card .uflag { font-size: 1.8rem; margin-bottom: 4px; }
  .user-card .uname { font-size: .95rem; font-weight: 700; }
  .user-card .ustats { font-size: .75rem; color: #666; margin-top: 2px; }
  .import-btn { width: 100%; padding: .75rem; border-radius: 8px; background: #2d7a3a; color: #fff; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background .15s; }
  .import-btn:hover { background: #235e2c; }
  .import-btn:disabled { background: #aaa; cursor: not-allowed; }
  .result { margin-top: 1rem; padding: .9rem 1rem; border-radius: 8px; font-size: .88rem; line-height: 1.6; display: none; }
  .result.ok { background: #e8f5ea; border: 1px solid #6abf76; color: #1a4a20; }
  .result.err { background: #fdeaea; border: 1px solid #e88080; color: #7a1a1a; }
  .progress { height: 6px; background: #e0e0e0; border-radius: 3px; margin-top: 1rem; overflow: hidden; display: none; }
  .progress-fill { height: 6px; background: #2d7a3a; border-radius: 3px; width: 0%; transition: width .3s; }
  .back-link { display: block; text-align: center; margin-top: 1.25rem; font-size: .82rem; color: #1a56a0; cursor: pointer; }
  .note { font-size: .78rem; color: #888; margin-top: .5rem; text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div style="font-size:2rem;text-align:center;margin-bottom:.5rem">⚽</div>
  <h1 style="text-align:center">Panini-Daten importieren</h1>
  <p class="sub" style="text-align:center">Daten aus der Excel-Tabelle direkt in Firebase laden</p>

  <label>Firebase-Datenbank URL</label>
  <input id="fb-url" value="https://paninitausch26-default-rtdb.firebaseio.com" placeholder="https://xxx-rtdb.firebaseio.com"/>

  <label>Für welchen Nutzer importieren?</label>
  <div class="user-cards">
    <div class="user-card selected" onclick="selectUser('moritz', this)">
      <div class="uflag">🏃</div>
      <div class="uname">Moritz</div>
      <div class="ustats">815 Sticker · 356 Doppelte</div>
    </div>
    <div class="user-card" onclick="selectUser('joerg', this)">
      <div class="uflag">👤</div>
      <div class="uname">Jörg</div>
      <div class="ustats">821 Sticker · 550 Doppelte</div>
    </div>
  </div>

  <button class="import-btn" onclick="runImport()">⬆ Daten jetzt importieren</button>
  <div class="progress" id="progress"><div class="progress-fill" id="pfill"></div></div>
  <div class="result" id="result"></div>
  <p class="note">Die Daten werden direkt in deine Firebase-Datenbank geladen.<br>Bestehende Einträge für diesen Nutzer werden überschrieben.</p>
  <a class="back-link" onclick="window.history.back()">← Zurück zur App</a>
</div>

let selectedUser = 'moritz';

function selectUser(user, el) {
  selectedUser = user;
  document.querySelectorAll('.user-card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

async function runImport() {
  const fbUrl = document.getElementById('fb-url').value.trim().replace(/\/$/, '');
  if (!fbUrl) { showResult('err', 'Bitte Firebase-URL eingeben!'); return; }

  const btn = document.querySelector('.import-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Importiere…';

  const prog = document.getElementById('progress');
  const pfill = document.getElementById('pfill');
  prog.style.display = 'block';
  pfill.style.width = '30%';

  const user = DATA[selectedUser];
  const key = user.name.toLowerCase();

  try {
    pfill.style.width = '60%';
    const payload = { name: user.name, data: user.data, updated: Date.now() };
    const res = await fetch(fbUrl + '/users/' + key + '.json', {
      method: 'PUT',
      mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    pfill.style.width = '100%';
    if (!res.ok) throw new Error('Firebase Fehler: ' + res.status + ' ' + res.statusText);
    const owned = Object.values(user.data).filter(v => v >= 1).length;
    const doubles = Object.values(user.data).filter(v => v === 2).length;
    showResult('ok', '<strong>✅ Import erfolgreich!</strong><br>' + owned + ' Sticker importiert, davon ' + doubles + ' Doppelte.<br><br>Öffne jetzt die App und melde dich als <strong>' + user.name + '</strong> an — alle Daten sind sofort sichtbar.');
  } catch (e) {
    showResult('err', '❌ Fehler: ' + e.message + '<br><br>Prüfe ob die Firebase-URL korrekt ist und der Testmodus aktiviert ist.');
  } finally {
    btn.disabled = false;
    btn.textContent = '⬆ Daten jetzt importieren';
    setTimeout(() => { prog.style.display = 'none'; pfill.style.width = '0%'; }, 1000);
  }
}

function showResult(type, html) {
  const el = document.getElementById('result');
  el.className = 'result ' + type;
  el.innerHTML = html;
  el.style.display = 'block';
  el.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
